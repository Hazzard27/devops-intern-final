name: CI Pipeline
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
 
jobs:
  build-and-run:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Run hello.py
        run: python hello.py
 
      - name: Build Docker image
        run: docker build -t hello-devops .
 
      - name: Run Docker container
        run: docker run --rm hello-devops
 
      - name: Make sysinfo.sh executable and run it
        run: |
          chmod +x scripts/sysinfo.sh
          bash scripts/sysinfo.sh
